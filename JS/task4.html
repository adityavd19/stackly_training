// ===========================================
// Task 3 : E-Commerce Cart
// ===========================================

console.log("===== TASK 3 =====");

let products = [
    {name:"Laptop", price:50000},
    {name:"Mouse", price:1000},
    {name:"Keyboard", price:2000}
];

function calculateBill(){

    let bill = 0;

    for(let item of products){
        bill += item.price;
    }

    console.log("Total Bill:", bill);

    if(bill > 5000){
        let discount = bill * 0.10;
        bill -= discount;
        console.log("10% Discount Applied");
    }

    console.log("Final Bill:", bill);
}

calculateBill();

// ===========================================
// Task 10 : Mini Employee Portal
// ===========================================

console.log("===== TASK 10 =====");

let employeeList = [];

function addEmployee(name,id,salary){
    employeeList.push({name,id,salary});
}

function viewEmployees(){
    console.log("Employee List");
    for(let emp of employeeList){
        console.log(emp);
    }
}

function calculateBonus(){
    for(let emp of employeeList){
        if(emp.salary >= 50000){
            console.log(emp.name + " : Eligible For Bonus");
        }else{
            console.log(emp.name + " : Not Eligible");
        }
    }
}

function searchEmployee(id){
    let emp = employeeList.find(e => e.id == id);
    if(emp){
        console.log("Employee Found:", emp);
    }else{
        console.log("Employee Not Found");
    }
}

function deleteEmployee(id){
    employeeList = employeeList.filter(e => e.id != id);
    console.log("Employee Deleted");
}

function totalEmployees(){
    console.log("Total Employees:", employeeList.length);
}

addEmployee("Aditya",101,30000);
